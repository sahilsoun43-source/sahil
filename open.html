<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
    <style>
        /* CSS: This makes the website look pretty */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
            padding: 20px;
            background: white;
            border-radius: 8px;
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #c0392b;
        }
    <!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #fdf5e6; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: serif; }

        /* The Envelope Container */
        .envelope-container {
            position: relative;
            width: 300px;
            height: 200px;
            background: #d4a373;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        /* The Message inside */
        #letter-content {
            display: none;
            background: light blue;
            padding: 20px;
            border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            width: 350px;
            position: absolute;
            top: -50px;
        }

        h2 { color: #582f0e; }
        .open-btn { margin-top: 80px; padding: 10px; background: pink; border: none; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="envelope-container" id="envelope">
        <button class="open-btn" onclick="openLetter()">Open Letter ✉️</button>

        <div id="letter-content">
            <h2>HELLO KITA,</h2>
            <p>This letter is for your appointment!!!!!</p>
            <p>ARE you free tonight?</p>
            <p><strong> let's play ludo</strong></p>
            <button onclick="location.reload()">Close</button>
        </div>
    </div>

    <script>
        function openLetter() {
            document.getElementById('letter-content').style.display = 'block';
            document.querySelector('.open-btn').style.display = 'none';
        }
    </script>

</body>
</html>

</body>
</html>
